<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<title>GLB viewer — WebGPU</title>
<style>
  html, body { margin: 0; height: 100%; overflow: hidden; background: #888;
               font: 12px ui-monospace, monospace; color: #fff; }
  #fps { position: fixed; top: 8px; left: 8px;
         background: rgba(0,0,0,.5); padding: 4px 8px; border-radius: 4px; }
</style>
</head>
<body>
<div id="fps"></div>

<script type="importmap">
{ "imports": {
  "three":          "https://cdn.jsdelivr.net/npm/three@0.180.0/build/three.module.js",
  "three/addons/":  "https://cdn.jsdelivr.net/npm/three@0.180.0/examples/jsm/",
  "three/webgpu":   "https://cdn.jsdelivr.net/npm/three@0.180.0/build/three.webgpu.js",
  "three/tsl":      "https://cdn.jsdelivr.net/npm/three@0.180.0/build/three.tsl.js"
}}
</script>

<script type="module">
import * as THREE from 'three/webgpu';
import {
  pass, mrt, output, normalView, metalness, roughness,
  directionToColor, colorToDirection, vec2, sample, blendColor,
} from 'three/tsl';
import { OrbitControls } from 'three/addons/controls/OrbitControls.js';
import { GLTFLoader }    from 'three/addons/loaders/GLTFLoader.js';
import { DRACOLoader }   from 'three/addons/loaders/DRACOLoader.js';
import { KTX2Loader }    from 'three/addons/loaders/KTX2Loader.js';
import { ao }    from 'three/addons/tsl/display/GTAONode.js';
import { ssr }   from 'three/addons/tsl/display/SSRNode.js';
import { bloom } from 'three/addons/tsl/display/BloomNode.js';

// renderer
const renderer = new THREE.WebGPURenderer({ antialias: false });
renderer.setPixelRatio(window.devicePixelRatio);
renderer.setSize(innerWidth, innerHeight);
renderer.toneMapping = THREE.ACESFilmicToneMapping;
renderer.toneMappingExposure = 4.0;
renderer.outputColorSpace = THREE.SRGBColorSpace;
document.body.appendChild(renderer.domElement);
await renderer.init();

const scene = new THREE.Scene();
scene.background = new THREE.Color(0xcccccc);

const camera = new THREE.PerspectiveCamera(45, innerWidth / innerHeight, 0.05, 200);
camera.position.set(0.75, 1.56, 1.37);

const controls = new OrbitControls(camera, renderer.domElement);
controls.target.set(0.095, 1.638, 0.448);

const pmrem = new THREE.PMREMGenerator(renderer);
{
  const whiteScene = new THREE.Scene();
  whiteScene.background = new THREE.Color(0xffffff);
  scene.environment = pmrem.fromScene(whiteScene).texture;
  scene.background = new THREE.Color(0xffffff);
}

const postProcessing = new THREE.PostProcessing(renderer);
const scenePass = pass(scene, camera);
const reflectivityGate = metalness.max(roughness.smoothstep(0.3, 0.5).oneMinus());
scenePass.setMRT(mrt({
  output,
  normal: directionToColor(normalView),
  metalrough: vec2(reflectivityGate, roughness),
}));
const sceneColor      = scenePass.getTextureNode('output');
const sceneDepth      = scenePass.getTextureNode('depth');
const sceneNormalEnc  = scenePass.getTextureNode('normal');
const sceneMR         = scenePass.getTextureNode('metalrough');

scenePass.getTexture('normal').type     = THREE.UnsignedByteType;
scenePass.getTexture('metalrough').type = THREE.UnsignedByteType;

const sceneNormal = sample((uv) => colorToDirection(sceneNormalEnc.sample(uv)));

// AO >>>
const aoNear = ao(sceneDepth, null, camera);
aoNear.radius.value  = 0.05;
aoNear.samples.value = 2;
aoNear.scale.value   = 0.5;

const aoFar = ao(sceneDepth, null, camera);
aoFar.radius.value  = 0.10;
aoFar.samples.value = 2;
aoFar.scale.value   = 0.5;

// SSR >>>
const ssrPass = ssr(sceneColor, sceneDepth, sceneNormal, sceneMR.r, sceneMR.g, camera);
ssrPass.maxDistance.value   = 1.0;
ssrPass.thickness.value     = 0.018;
ssrPass.opacity.value       = 1.0;
ssrPass.quality.value       = 1.0;
ssrPass.blurQuality.value   = 1;
ssrPass.resolutionScale     = 0.5;

// BLOOM >>> 
const bloomPass = bloom(sceneColor, 0.4, 0.6, 1.0);

const fx = { ssr: true, ao: true, bloom: true };

function applyOutput() {
  let n = fx.ssr ? blendColor(sceneColor, ssrPass) : sceneColor;
  if (fx.ao)    n = n.mul(aoNear.getTextureNode()).mul(aoFar.getTextureNode());
  if (fx.bloom) n = n.add(bloomPass);
  postProcessing.outputNode = n;
  postProcessing.needsUpdate = true;
}
applyOutput();

let aoEnabled = true;

// loaders
const draco = new DRACOLoader();
draco.setDecoderPath('https://cdn.jsdelivr.net/npm/three@0.180.0/examples/jsm/libs/draco/');
const ktx2 = new KTX2Loader();
ktx2.setTranscoderPath('https://cdn.jsdelivr.net/npm/three@0.180.0/examples/jsm/libs/basis/');
ktx2.detectSupport(renderer);

const loader = new GLTFLoader();
loader.setDRACOLoader(draco);
loader.setKTX2Loader(ktx2);

loader.register((parser) => ({
  name: 'KHR_materials_pbrSpecularGlossiness',
  getMaterialType(idx) {
    const def = parser.json.materials[idx];
    return def.extensions?.[this.name] ? THREE.MeshStandardMaterial : null;
  },
  extendMaterialParams(idx, params) {
    const def = parser.json.materials[idx];
    const sg = def.extensions?.[this.name];
    if (!sg) return Promise.resolve();
    const gloss = sg.glossinessFactor ?? 1.0;
    const spec  = sg.specularFactor || [1, 1, 1];
    const diff  = sg.diffuseFactor  || [1, 1, 1, 1];
    const diffAvg = (diff[0] + diff[1] + diff[2]) / 3;
    const specMax = Math.max(spec[0], spec[1], spec[2]);
    const isMetal = diffAvg < 0.05 && specMax > 0.5;
    params.roughness = 1.0 - gloss;
    params.metalness = isMetal ? 1.0 : 0.0;
    const col = isMetal ? spec : diff.slice(0, 3);
    params.color = new THREE.Color(col[0], col[1], col[2]);
    if (diff[3] !== undefined && diff[3] < 1.0) {
      params.transparent = true;
      params.opacity = diff[3];
    }
    const pending = [];
    if (sg.diffuseTexture) {
      pending.push(parser.assignTexture(params, 'map', sg.diffuseTexture, THREE.SRGBColorSpace));
    }
    return Promise.all(pending);
  },
}));

loader.load('bathroom_interior.glb', async (gltf) => {
  const root = gltf.scene;
  const box = new THREE.Box3().setFromObject(root);
  const c = box.getCenter(new THREE.Vector3());
  root.position.x -= c.x;
  root.position.y -= box.min.y;
  root.position.z -= c.z;
  scene.add(root);

  let fixedTransparent = 0, realTransparent = 0;
  root.traverse((o) => {
    if (!o.isMesh || !o.material) return;
    const mats = Array.isArray(o.material) ? o.material : [o.material];
    for (const m of mats) {
      if (!m.transparent) continue;
      if (m.opacity < 0.999 || m.alphaMap || m.alphaTest > 0) {
        realTransparent++;
        continue;
      }
      m.transparent = false;
      m.depthWrite = true;
      m.needsUpdate = true;
      fixedTransparent++;
    }
  });
  console.log(`materials: de-transparented ${fixedTransparent}, remaining truly-transparent ${realTransparent}`);

  const LAMP_NAME = /light|lamp/i;
  const LAMP_MIN_Y = 2.9;
  const LAMP_INTENSITY = 8;
  const LAMP_RANGE_MULT = 8;
  const lamps = [];
  root.traverse((o) => {
    if (!LAMP_NAME.test(o.name)) return;
    let mesh = o.isMesh ? o : null;
    if (!mesh) o.traverse((c) => { if (!mesh && c.isMesh) mesh = c; });
    if (!mesh) return;
    mesh.updateMatrixWorld(true);
    const pos = new THREE.Vector3();
    mesh.getWorldPosition(pos);
    if (pos.y < LAMP_MIN_Y) return;
    const bbox = new THREE.Box3().setFromObject(mesh);
    const size = bbox.isEmpty() ? new THREE.Vector3(0.3, 0.3, 0.3) : bbox.getSize(new THREE.Vector3());
    const range = Math.max(size.length() * LAMP_RANGE_MULT, 3);

    const mat = mesh.material;
    let lampColor = new THREE.Color(0xffffff);
    let lampIntensity = LAMP_INTENSITY;
    if (mat && mat.emissive) {
      const luma = (mat.emissive.r + mat.emissive.g + mat.emissive.b) / 3;
      const ei = mat.emissiveIntensity ?? 1;
      if (luma > 0.01 || ei > 1) {
        lampIntensity = luma * ei;
        if (luma > 0.01) lampColor = mat.emissive.clone();
      }
    }
    const light = new THREE.PointLight(lampColor, lampIntensity, range, 2);
    light.position.copy(pos);
    scene.add(light);
    lamps.push(light);
  });
  console.log(`lamps from named objects (above ${LAMP_MIN_Y}m): ${lamps.length}`);

  {
    const probePos = camera.position.clone();

    async function bakeProbe() {
      const target = new THREE.WebGLCubeRenderTarget(512, {
        type: THREE.HalfFloatType,
        generateMipmaps: false,
      });
      const cam = new THREE.CubeCamera(0.05, 200, target);
      cam.position.copy(probePos);

      cam.coordinateSystem = renderer.coordinateSystem;
      cam.updateCoordinateSystem();
      cam.updateMatrixWorld(true);

      const prevRT = renderer.getRenderTarget();
      const prevFace = renderer.getActiveCubeFace();
      for (let i = 0; i < 6; i++) {
        renderer.setRenderTarget(target, i);
        await renderer.renderAsync(scene, cam.children[i]);
      }
      renderer.setRenderTarget(prevRT, prevFace);
      target.texture.needsPMREMUpdate = true;

      const newEnv = pmrem.fromCubemap(target.texture).texture;
      target.dispose();
      return newEnv;
    }

    for (let pass = 0; pass < 2; pass++) {
      const oldEnv = scene.environment;
      scene.environment = await bakeProbe();
      if (oldEnv && oldEnv.dispose) oldEnv.dispose();
      console.log(`probe bake pass ${pass + 1} done — scene.environment swapped`);
    }
  }
});

const fpsEl = document.getElementById('fps');
let framesThisSec = 0;
let secondStart = performance.now();
let displayedFps = 0;
let lastFrameMs = 0;
let lastCalls = 0;

async function animate() {
  const t0 = performance.now();
  controls.update();

  if (aoEnabled || fx.ssr || fx.bloom) {
    await postProcessing.renderAsync();
  } else {
    await renderer.renderAsync(scene, camera);
  }

  lastFrameMs = performance.now() - t0;
  framesThisSec++;
  if (t0 - secondStart >= 1000) {
    displayedFps = framesThisSec;
    framesThisSec = 0;
    secondStart = t0;
    lastCalls = renderer.info.render.calls;
  }
  fpsEl.textContent = `${displayedFps} fps   ${lastFrameMs.toFixed(1)}ms`;
  requestAnimationFrame(animate);
}
animate();

addEventListener('resize', () => {
  camera.aspect = innerWidth / innerHeight;
  camera.updateProjectionMatrix();
  renderer.setSize(innerWidth, innerHeight);
});
</script>
</body>
</html>
